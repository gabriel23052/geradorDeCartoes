<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Gerador de artes" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link rel="stylesheet" href="/src/main.css">
  <title>Criador de Artes</title>
</head>

<body>
  <header class="header">
    <a class="header-logo" href="https://cresol.com.br/" target="_blank">
      <img src="svg/logo.svg" alt="Logo da Cresol">
    </a>
    <div class="header-description">
      <h1 class="t-title neutral-tx0">Criador de Artes</h1>
      <p class="t-paragraph neutral-tx1">
        Ferramenta automatizada para criação de artes personalizadas
      </p>
    </div>
  </header>

  <main class="mainContainer neutral-bg1">
    <form class="form" action="./" data-selector="form">
      <div class="form-field form-field-name">
        <label class="t-label neutral-tx1" for="name">Nome</label>
        <input class="t-input neutral-tx1 neutral-bg0" type="name" name="name" id="name" autocomplete="off" maxlength="25" data-selector="nameInput" placeholder="Nome do destinatário">
      </div>
      <div class="form-field form-field-pattern">
        <label class="t-label neutral-tx1" for="model">Modelo</label>
        <select class="t-input neutral-bg0 neutral-tx1" data-selector="select" name="model" id="model"></select>
      </div>
      <a class="form-downloadLink t-buttonLabel neutral-tx2" data-selector="downloadLink" data-available="false">
        Baixar
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 -960 960 960">
          <path d="M479-330 247-562l70-68 113 113v-331h98v331l113-113 70 68zM257.72-160q-40.45 0-69.08-28.79Q160-217.57 160-258v-72h98v72h444v-72h98v72q0 40.7-28.8 69.35T701.96-160z" />
        </svg>
      </a>
    </form>
    <div class="preview">
      <p class="preview-noImageText t-paragraph neutral-tx1" data-selector="noImageText" data-show="true">Para começar, preencha um nome e escolha um dos modelos disponíveis.</p>
      <img class="preview-image" data-selector="preview" data-show="false">
      <img class="preview-loading" src="/svg/cresol-logo-loading.svg" alt="Carregando arte" data-selector="loading" data-show="false">
    </div>
  </main>
  <footer class="credits">
    <p class="t-paragraph neutral-tx1">Desenvolvido por Gabriel G. Pereira</p>
  </footer>
  <script type="module" src="src/main.ts"></script>
</body>

</html>

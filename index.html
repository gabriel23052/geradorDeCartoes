<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Gerador de artes" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link rel="stylesheet" href="/src/main.css">
  <title>Criador de Artes</title>
</head>

<body>
  <img class="logo" src="svg/logo.svg" alt="Logo da Cresol">
  <main class="mainContainer">
    <form class="form" action="./" data-selector="form">
      <div class="form-field">
        <label class="t-label neutral-tx1" for="name">Nome</label>
        <input class="t-input neutral-bg0 neutral-tx0" type="name" name="name" id="name" autocomplete="off" maxlength="25" data-selector="nameInput">
      </div>
      <div class="form-field">
        <label class="t-label neutral-tx1" for="model">Modelo</label>
        <select class="t-input neutral-bg0 neutral-tx0" data-selector="select" name="model" id="model"></select>
      </div>
      <a class="form-downloadLink t-buttonLabel neutral-bg2 neutral-tx2" data-selector="downloadLink" data-available="false">BAIXAR ARTE</a>
    </form>
    <div class="preview">
      <p class="preview-noImageText t-paragraph neutral-tx1" data-selector="noImageText" data-show="true">Preencha um nome e escolha um modelo</p>
      <img class="preview-image" data-selector="preview" data-show="false">
      <img class="preview-loading" src="/svg/cresol-logo-loading.svg" alt="Carregando arte" data-selector="loading" data-show="false">
    </div>
  </main>
  <footer class="credits">
    <p class="t-paragraph neutral-tx1">Desenvolvido por Gabriel G. Pereira</p>
  </footer>
  <script type="module" src="src/main.ts"></script>
</body>

</html>
